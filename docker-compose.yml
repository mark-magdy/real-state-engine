version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      # Pass your MongoDB Atlas URI here or load it via .env file
      - MONGO_URI=${MONGO_URI:-mongodb+srv://<username>:<password>@cluster0.example.mongodb.net/property_db?retryWrites=true&w=majority}
    networks:
      - app-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge